#spring.cloud.gateway.server.webmvc.routes[1].id=subscription-service
#spring.cloud.gateway.server.webmvc.routes[1].uri=lb://SUBSCRIPTION-SERVICE
#spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/subscriptions/**
#
