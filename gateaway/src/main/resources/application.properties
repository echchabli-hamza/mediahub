spring.application.name=gateaway
server.port=7001

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Shared JWT secret (must match user-service)
app.jwt.secret=3d5e8f2a1b9c4d7e6f0a3b5c8d1e4f7a2b5c8d1e4f7a2b5c8d1e4f7a2b5c8d

# ---- Gateway Routes ----

# Route 0: Public — /auth/** → user-service (register + login, no JWT required)
spring.cloud.gateway.server.webmvc.routes[0].id=auth-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# Route 1: Protected — /users/** → user-service (requires JWT, verified by JwtAuthFilter)
spring.cloud.gateway.server.webmvc.routes[1].id=user-service-route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/users/**

# Route 2: Protected — /media/** → media-service (future, requires JWT)
spring.cloud.gateway.server.webmvc.routes[2].id=media-service-route
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://MEDIA-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/media/**

# ---- Logging / Actuator ----
logging.level.org.springframework.cloud.gateway=DEBUG
management.endpoints.web.exposure.include=gateway,health,info
management.endpoint.gateway.enabled=true