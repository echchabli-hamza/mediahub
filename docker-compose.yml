services:

  # ---- Config Server ----
  configserver:
    build: ./configserver
    container_name: configserver
    ports:
      - "8888:8888"
    networks:
      - microservices-net

  # ---- Eureka Server ----
  media:
    build: ./media
    container_name: media
    ports:
      - "8761:8761"
    networks:
      - microservices-net

  # ---- PostgreSQL (User Service) ----
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: "1111"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-net

  # ---- PostgreSQL (Media Service) ----
  postgres-media:
    image: postgres:16-alpine
    container_name: postgres-media
    environment:
      POSTGRES_DB: mediadb
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: "1111"
    ports:
      - "5434:5432"
    volumes:
      - postgres-media-data:/var/lib/postgresql/data
    networks:
      - microservices-net

  # ---- User Service (hot reload) ----
  user-service:
    image: eclipse-temurin:21-jdk
    container_name: user-service
    working_dir: /app
    entrypoint: ["bash", "./entrypoint-dev.sh"]
    ports:
      - "8081:8081"
    volumes:
      - ./user-service:/app
      - user-service-m2:/root/.m2
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://media:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: user1
      SPRING_DATASOURCE_PASSWORD: "1111"
    networks:
      - microservices-net

  # ---- Media Service (hot reload) ----
  media-service:
    image: eclipse-temurin:21-jdk
    container_name: media-service
    working_dir: /app
    entrypoint: ["bash", "./entrypoint-dev.sh"]
    ports:
      - "8082:8082"
    volumes:
      - ./mediaService:/app
      - media-service-m2:/root/.m2
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://media:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-media:5432/mediadb
      SPRING_DATASOURCE_USERNAME: user1
      SPRING_DATASOURCE_PASSWORD: "1111"
    depends_on:
      - postgres-media
      - media
    networks:
      - microservices-net

  # ---- Gateway (hot reload) ----
  gateaway:
    image: eclipse-temurin:21-jdk
    container_name: gateaway
    working_dir: /app
    entrypoint: ["bash", "./entrypoint-dev.sh"]
    ports:
      - "7001:7001"
    volumes:
      - ./gateaway:/app
      - gateaway-m2:/root/.m2
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://media:8761/eureka/
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres-data:
  postgres-media-data:
  user-service-m2:
  media-service-m2:
  gateaway-m2:
